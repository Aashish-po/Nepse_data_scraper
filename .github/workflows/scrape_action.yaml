name: Nepse Data Auto Scrape

on:
  push:
    branches:
      - main
  schedule:
    - cron: '15 10 * * *'  # 4:00 PM Nepal Time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: 3.9
      
      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Execute Scraping Script
        run: |
          python scraper.py

      - name: Commit and Push Files
        run: |
          git config --local user.email "poudelashish572@gmail.com"
          git config --local user.name "aashishpaudel"
          
          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: NEPSE data scraped"
            git push origin main
          else
            echo "No changes to commit"
          fi